name: Build Index

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate automations
        run: node .github/scripts/validate.js

      - name: Build index.json and llms.txt
        run: node .github/scripts/build-index.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json llms.txt
          git diff --staged --quiet || git commit -m "Rebuild index.json and llms.txt"
          git push

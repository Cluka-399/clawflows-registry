name: attribution-detective
description: Correlate conversion paths across touchpoints, identify the journeys that actually close, and summarize where budget or content should move
author: cluka
version: 1.1.0

requires:
  - capability: analytics
  - capability: llm
  - capability: database

trigger:
  schedule: "0 6 * * 1"

config:
  project:
    description: "Analytics project or property name"
    default: "main-site"

  time_period:
    description: "Attribution lookback window"
    default: "30d"

steps:
  - name: fetch-attribution-data
    capability: analytics
    method: getAttributionJourneys
    args:
      project: "${config.project}"
      period: "${config.time_period}"
    capture: journeys

  - name: store-latest-snapshot
    capability: database
    method: diffSeen
    args:
      namespace: "attribution-detective"
      items: "${journeys}"
    capture: changes

  - name: explain-journeys
    capability: llm
    method: summarize
    args:
      prompt: "Analyze these attribution journeys. Identify the most common first touch, the touchpoints that appear most often in winning paths, the likely closing touch, and the clearest recommendation for content or budget allocation."
      input: "${{ journeys, changes }}"
    capture: summary

  - name: notify
    action: notify
    message: "🧭 Attribution Detective\n\n${summary}"

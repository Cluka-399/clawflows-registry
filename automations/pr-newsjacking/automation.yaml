name: pr-newsjacking
description: Track breaking industry news, identify stories worth reacting to, and draft journalist-ready commentary or outreach
author: cluka
version: 1.1.0

requires:
  - capability: web-search
  - capability: web-fetch
  - capability: llm
  - capability: email

trigger:
  schedule: "0 */2 * * *"

config:
  industry_keywords:
    description: "Industry topics to monitor"
    default: "ai design"

  expert_bio:
    description: "Expert credentials for media commentary"
    default: "Founder and product leader in AI design tools"

steps:
  - name: search-news
    capability: web-search
    method: search
    args:
      query: "${config.industry_keywords} breaking news launch funding controversy"
    capture: news

  - name: fetch-news-context
    capability: web-fetch
    method: fetch
    args:
      url: "${news.url || news}"
    capture: context

  - name: draft-commentary
    capability: llm
    method: summarize
    args:
      prompt: "Review this news set and identify which story is hottest and most worth reacting to. Draft concise expert commentary and a journalist-facing angle using this expert bio: ${config.expert_bio}."
      input: "${{ news, context }}"
    capture: commentary

  - name: draft-pitches
    capability: email
    method: draftCampaign
    args:
      audience: "${news}"
      brief: "${commentary}"
    capture: draft

  - name: notify
    action: notify
    message: "📰 PR Newsjacking\n\n${commentary}"

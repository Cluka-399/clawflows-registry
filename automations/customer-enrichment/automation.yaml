name: customer-enrichment
description: Enrich a prospect from an email or domain using company pages, search context, and an LLM summary
author: cluka
version: 1.1.0

requires:
  - capability: web-fetch
  - capability: web-search
  - capability: llm

trigger:
  manual: true

config:
  input:
    description: "Email address or domain to enrich"
    default: "example.com"

  product_context:
    description: "Product context for pain-point matching"
    default: ""

steps:
  - name: fetch-company-site
    capability: web-fetch
    method: fetch
    args:
      url: "https://${config.input.replace(/^.*@/, '')}"
    capture: website

  - name: search-company-context
    capability: web-search
    method: search
    args:
      query: "${config.input} company CEO CTO founder funding launch"
    capture: search_results

  - name: enrich-company
    capability: llm
    method: summarize
    args:
      prompt: "Using the website and search context, produce a structured company enrichment summary. Include company description, likely key people, momentum signals, and likely pain points relative to this product context: ${config.product_context}."
      input: "${{ website, search_results }}"
    capture: enrichment

  - name: notify
    action: notify
    message: "🧾 Customer Enrichment\n\n${enrichment}"

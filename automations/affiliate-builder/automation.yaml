name: affiliate-builder
description: Find promising affiliate partners, analyze whether they already monetize adjacent content, and draft personalized recruitment outreach
author: cluka
version: 1.1.0

requires:
  - capability: web-search
  - capability: web-fetch
  - capability: llm
  - capability: email

trigger:
  schedule: "0 10 * * 1"

config:
  target_keywords:
    description: "Keywords affiliates should already rank for"
    default:
      - "best ai design tools"
      - "website builder for designers"

  your_product:
    description: "Your product name"
    default: "Your product"

  commission_details:
    description: "Affiliate commission summary"
    default: "Revenue share available"

steps:
  - name: find-affiliate-prospects
    capability: web-search
    method: search
    args:
      query: "${config.target_keywords.join(' OR ')} best tools guide affiliate review"
    capture: prospects

  - name: fetch-prospect-pages
    capability: web-fetch
    method: fetch
    args:
      url: "${prospects.url || prospects}"
    capture: prospect_pages

  - name: score-prospects
    capability: llm
    method: summarize
    args:
      prompt: "Review these affiliate prospect pages. Identify which publishers already monetize adjacent content, mention competitors, or look likely to join an affiliate program. Recommend the best outreach targets and why."
      input: "${{ prospects, prospect_pages, your_product: config.your_product, commission_details: config.commission_details }}"
    capture: plan

  - name: draft-affiliate-outreach
    capability: email
    method: draftCampaign
    args:
      audience: "${prospects}"
      brief: "${plan}"
    capture: draft

  - name: notify
    action: notify
    message: "🤝 Affiliate Builder\n\n${plan}"

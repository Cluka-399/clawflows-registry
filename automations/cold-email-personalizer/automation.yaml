name: cold-email-personalizer
description: Research target accounts, extract likely pain points from public sources, and draft personalized outbound emails
author: cluka
version: 1.1.0

requires:
  - capability: web-search
  - capability: web-fetch
  - capability: llm
  - capability: email

trigger:
  manual: true

config:
  target_accounts:
    description: "Target company domains or names"
    default:
      - "example.com"

  target_titles:
    description: "Titles to look for"
    default:
      - "CEO"
      - "CTO"
      - "Head of Product"

steps:
  - name: find-decision-makers
    capability: web-search
    method: search
    args:
      query: "${config.target_accounts.join(' OR ')} ${config.target_titles.join(' OR ')} LinkedIn"
    capture: prospects

  - name: fetch-public-context
    capability: web-fetch
    method: fetch
    args:
      url: "${prospects.url || prospects}"
    capture: context_pages

  - name: craft-personalization
    capability: llm
    method: summarize
    args:
      prompt: "Using these public sources, identify likely pain points, notable recent posts or announcements, and the strongest personalization angle for each prospect. Then draft concise outbound email guidance that is specific, not generic."
      input: "${{ prospects, context_pages }}"
    capture: plan

  - name: draft-emails
    capability: email
    method: draftCampaign
    args:
      audience: "${prospects}"
      brief: "${plan}"
    capture: draft

  - name: notify
    action: notify
    message: "✉️ Cold Email Personalizer\n\n${plan}"

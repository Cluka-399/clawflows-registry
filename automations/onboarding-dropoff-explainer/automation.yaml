name: onboarding-dropoff-explainer
description: Find where users abandon onboarding, explain the likeliest friction point, and suggest the first fix to test
author: cluka
version: 1.0.1

requires:
  - capability: analytics
  - capability: llm

trigger:
  schedule: "0 */4 * * *"

config:
  project:
    description: "Analytics project or property name"
    default: "main-site"

  onboarding_steps:
    description: "Ordered onboarding steps to inspect"
    default:
      - "landing"
      - "signup"
      - "workspace_created"
      - "first_value"

  lookback_hours:
    description: "How far back to compare"
    default: 24

  use_session_replay:
    description: "Use replay/session samples when a session-replay capability is available"
    default: false

steps:
  - name: fetch-onboarding-funnel
    capability: analytics
    method: getFunnel
    args:
      project: "${config.project}"
      steps: "${config.onboarding_steps}"
      lookback_hours: "${config.lookback_hours}"
    capture: funnel

  - name: fetch-dropoff-sessions
    condition: "config.use_session_replay"
    capability: session-replay
    method: getDropoffSessions
    args:
      project: "${config.project}"
      steps: "${config.onboarding_steps}"
      lookback_hours: "${config.lookback_hours}"
      limit: 10
    capture: sessions

  - name: build-analysis-input
    action: evaluate
    expression: |
      return {
        funnel,
        sessions: typeof sessions === 'undefined' ? [] : sessions,
        used_session_replay: Boolean(config.use_session_replay && typeof sessions !== 'undefined')
      };
    capture: analysis_input

  - name: explain-friction
    capability: llm
    method: summarize
    args:
      prompt: "Identify the onboarding step with the most meaningful drop-off. Use session samples if present, otherwise rely on funnel-only evidence. Explain the likeliest friction or confusion point and suggest the first fix to test."
      input: "${analysis_input}"
    capture: summary

  - name: notify
    action: notify
    message: "🚪 Onboarding Dropoff Explainer\n\n${summary}"

name: influencer-outreach
description: Find likely niche influencers, assess audience overlap, and draft personalized outreach without pretending to auto-DM people
author: cluka
version: 1.1.0

requires:
  - capability: web-search
  - capability: web-fetch
  - capability: llm
  - capability: email

trigger:
  schedule: "0 8 * * 1"

config:
  niche_keywords:
    description: "Niche keywords to search"
    default: "ai design creators"

  icp_definition:
    description: "Ideal customer profile"
    default: "designers using AI tools"

steps:
  - name: find-influencers
    capability: web-search
    method: search
    args:
      query: "${config.niche_keywords} creator newsletter podcast x"
    capture: influencers

  - name: fetch-public-context
    capability: web-fetch
    method: fetch
    args:
      url: "${influencers.url || influencers}"
    capture: context_pages

  - name: plan-outreach
    capability: llm
    method: summarize
    args:
      prompt: "Analyze these influencer candidates. Identify which ones have the strongest audience overlap with this ICP: ${config.icp_definition}. Explain the strongest personalization angle for outreach and recommend who is worth contacting first."
      input: "${{ influencers, context_pages }}"
    capture: plan

  - name: draft-outreach
    capability: email
    method: draftCampaign
    args:
      audience: "${influencers}"
      brief: "${plan}"
    capture: draft

  - name: notify
    action: notify
    message: "📣 Influencer Outreach\n\n${plan}"

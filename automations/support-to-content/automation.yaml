name: support-to-content
description: Analyze recurring support questions, identify the content opportunities with the biggest leverage, and generate briefs for what to write next
author: cluka
version: 1.1.0

requires:
  - capability: database
  - capability: llm

trigger:
  schedule: "0 9 * * 1"

config:
  source:
    description: "Support export source identifier"
    default: "support-tickets"

  limit:
    description: "How many records to inspect"
    default: 100

steps:
  - name: load-support-data
    capability: database
    method: listItems
    args:
      source: "${config.source}"
      limit: "${config.limit}"
    capture: tickets

  - name: analyze-content-opportunities
    capability: llm
    method: summarize
    args:
      prompt: "Analyze these support records. Identify the most common questions or frustrations, rank the content opportunities by likely support-load reduction and user impact, and propose the best help article or blog brief to create next."
      input: "${tickets}"
    capture: briefs

  - name: notify
    action: notify
    message: "🛟 Support to Content\n\n${briefs}"

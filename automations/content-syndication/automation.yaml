name: content-syndication
description: Reframe a source article for multiple publishing targets, produce platform-specific drafts, and summarize the best distribution plan
author: cluka
version: 1.1.0

requires:
  - capability: web-fetch
  - capability: llm
  - capability: database

trigger:
  manual: true

config:
  source_url:
    description: "Canonical source article URL"
    default: "https://example.com/post"

  target_platforms:
    description: "Platforms to syndicate across"
    default:
      - "medium"
      - "devto"
      - "linkedin"
      - "x-thread"

steps:
  - name: fetch-source-article
    capability: web-fetch
    method: fetch
    args:
      url: "${config.source_url}"
    capture: source_article

  - name: generate-platform-versions
    capability: llm
    method: summarize
    args:
      prompt: "Adapt this source article for the requested syndication targets. For each platform, suggest the best angle, tone, and structure. Keep versions platform-native and avoid duplicate-feeling copy. Platforms: ${config.target_platforms.join(', ')}."
      input: "${source_article}"
    capture: drafts

  - name: save-drafts
    capability: database
    method: diffSeen
    args:
      namespace: "content-syndication"
      items: "${drafts}"
    capture: saved

  - name: notify
    action: notify
    message: "📡 Content Syndication\n\n${drafts}"

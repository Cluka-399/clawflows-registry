name: backlink-hunter
description: Find likely broken-link replacement opportunities in your niche, match them to your content, and draft outreach
author: cluka
version: 1.1.0

requires:
  - capability: web-search
  - capability: web-fetch
  - capability: llm
  - capability: email

trigger:
  schedule: "0 6 * * 1"

config:
  niche_keywords:
    description: "Topic keywords for resource pages"
    default: "ai design"

  your_content_urls:
    description: "Your best replacement content URLs"
    default:
      - "https://example.com/guide"

steps:
  - name: find-resource-pages
    capability: web-search
    method: search
    args:
      query: "${config.niche_keywords} inurl:resources links tools"
    capture: pages

  - name: fetch-resource-pages
    capability: web-fetch
    method: fetch
    args:
      url: "${pages.url || pages}"
    capture: page_data

  - name: match-replacements
    capability: llm
    method: summarize
    args:
      prompt: "Review these resource pages and identify likely broken-link or outdated-link replacement opportunities. Match each opportunity to the best URL from our content list and explain the outreach angle."
      input: "${{ pages, page_data, your_content_urls: config.your_content_urls }}"
    capture: plan

  - name: draft-outreach
    capability: email
    method: draftCampaign
    args:
      audience: "${pages}"
      brief: "${plan}"
    capture: draft

  - name: notify
    action: notify
    message: "🔗 Backlink Hunter\n\n${plan}"

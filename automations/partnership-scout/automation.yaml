name: partnership-scout
description: Find complementary companies serving the same audience, assess partnership fit, and draft a co-marketing outreach angle
author: cluka
version: 1.1.0

requires:
  - capability: web-search
  - capability: web-fetch
  - capability: llm
  - capability: email

trigger:
  schedule: "0 9 * * 1"

config:
  target_audience:
    description: "Audience you serve"
    default: "designers using AI tools"

  your_product:
    description: "Your product name"
    default: "Your product"

  exclude_competitors:
    description: "Competitors to exclude"
    default:
      - "competitor-a"
      - "competitor-b"

steps:
  - name: find-adjacent-companies
    capability: web-search
    method: search
    args:
      query: "${config.target_audience} tools software partnerships -${config.exclude_competitors.join(' -')}"
    capture: companies

  - name: fetch-company-context
    capability: web-fetch
    method: fetch
    args:
      url: "${companies.url || companies}"
    capture: company_pages

  - name: identify-partnership-angles
    capability: llm
    method: summarize
    args:
      prompt: "Analyze these companies for partnership fit. Identify which ones serve the same audience without being direct competitors, what partnership signals they show, and the best co-marketing or integration angle for each."
      input: "${{ companies, company_pages, your_product: config.your_product }}"
    capture: plan

  - name: draft-partnership-outreach
    capability: email
    method: draftCampaign
    args:
      audience: "${companies}"
      brief: "${plan}"
    capture: draft

  - name: notify
    action: notify
    message: "🫱🏻‍🫲🏽 Partnership Scout\n\n${plan}"

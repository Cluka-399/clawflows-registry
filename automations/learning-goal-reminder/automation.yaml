name: Learning Goal Reminder
description: Track learning goals with progress milestones, deadlines, and escalating reminders
author: smartrus
version: 1.0.0

requires:
  - file_system
  - notifications

trigger:
  schedule: "0 9 * * *"  # Daily at 9am

config:
  goals_file:
    description: "Path to JSON file with learning goals, milestones, and deadlines"
    default: "~/.learning-goals.json"

  reminder_style:
    description: "Reminder escalation: gentle, moderate, or urgent as deadlines approach"
    default: "moderate"

  lookahead_days:
    description: "Days ahead to warn about upcoming milestones"
    default: 7

tags:
  - learning
  - productivity
  - education
  - reminders
  - goals

steps:
  - name: load-goals
    capability: file_system
    method: read
    args:
      path: "${config.goals_file}"
    capture: goalsData

  - name: evaluate-progress
    action: evaluate
    script: |
      const today = new Date().toISOString().slice(0, 10);
      const goals = JSON.parse('${goalsData}');
      return goals.goals.map(goal => {
        const totalMilestones = goal.milestones.length;
        const completed = goal.milestones.filter(m => m.completed).length;
        const pct = Math.round((completed / totalMilestones) * 100);
        const deadlineDate = new Date(goal.deadline);
        const todayDate = new Date(today);
        const daysLeft = Math.ceil((deadlineDate - todayDate) / 86400000);
        const nextMilestone = goal.milestones.find(m => !m.completed);
        return {
          name: goal.name,
          progress: pct,
          daysLeft,
          deadline: goal.deadline,
          nextMilestone: nextMilestone ? nextMilestone.title : null,
          nextMilestoneDue: nextMilestone ? nextMilestone.due : null,
          totalMilestones,
          completed,
          overdue: daysLeft < 0,
          status: daysLeft < 0 ? "OVERDUE" :
                  daysLeft === 0 ? "DUE TODAY" :
                  daysLeft <= 3 ? "URGENT" :
                  daysLeft <= 7 ? "SOON" : "ON TRACK"
        };
      });
    capture: evaluated

  - name: format-report
    action: evaluate
    script: |
      const goals = ${evaluated};
      const urgent = goals.filter(g => ["OVERDUE","DUE TODAY","URGENT"].includes(g.status));
      const onTrack = goals.filter(g => !["OVERDUE","DUE TODAY","URGENT"].includes(g.status));
      let msg = "📚 Learning Goal Tracker\n═══════════════════════\n\n";
      if (urgent.length) {
        msg += "🚨 Needs Attention:\n";
        urgent.forEach(g => {
          msg += `  ${g.status === "OVERDUE" ? "🔴" : g.status === "DUE TODAY" ? "🟠" : "🟡"} ${g.name} — ${g.progress}% done, ${g.status}\n`;
          if (g.nextMilestone) msg += `     Next: ${g.nextMilestone}\n`;
        });
        msg += "\n";
      }
      if (onTrack.length) {
        msg += "✅ On Track:\n";
        onTrack.forEach(g => {
          msg += `  🟢 ${g.name} — ${g.progress}% done, ${g.daysLeft}d left\n`;
          if (g.nextMilestone) msg += `     Next: ${g.nextMilestone}\n`;
        });
      }
      return msg;
    capture: report

  - name: notify
    action: notify
    message: "${report}"

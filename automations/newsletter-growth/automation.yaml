name: newsletter-growth
description: Find promising newsletter partnership targets, analyze churn pressure, and draft the first outreach or swap angle
author: cluka
version: 1.1.0

requires:
  - capability: analytics
  - capability: web-search
  - capability: llm
  - capability: email

trigger:
  schedule: "0 8 * * 1"

config:
  project:
    description: "Analytics project or property name"
    default: "main-site"

  niche:
    description: "Newsletter niche or audience theme"
    default: "ai design"

  subscriber_count:
    description: "Current subscriber count"
    default: 1000

  unsubscribe_window_days:
    description: "How far back to inspect churn patterns"
    default: 30

steps:
  - name: find-partner-targets
    capability: web-search
    method: search
    args:
      query: "${config.niche} newsletter Substack Beehiiv cross-promotion"
    capture: targets

  - name: fetch-newsletter-health
    capability: analytics
    method: getNewsletterGrowth
    args:
      project: "${config.project}"
      unsubscribe_window_days: "${config.unsubscribe_window_days}"
    capture: newsletter_health

  - name: plan-growth-moves
    capability: llm
    method: summarize
    args:
      prompt: "Using the newsletter search results and growth data, identify the most promising cross-promotion targets, summarize the churn pattern that matters most, and recommend the best next growth move."
      input: "${{ targets, newsletter_health, subscriber_count: config.subscriber_count, niche: config.niche }}"
    capture: plan

  - name: draft-outreach
    capability: email
    method: draftCampaign
    args:
      audience: "${targets}"
      brief: "${plan}"
    capture: outreach_draft

  - name: notify
    action: notify
    message: "📰 Newsletter Growth\n\n${plan}"
